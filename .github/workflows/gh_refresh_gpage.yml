name: Daily ILACS Scrape & Deploy

on:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 5 * * *'   # daily at 05:00 UTC
  workflow_dispatch:       # allows manual runs
  # Deliberately no `pull_request` trigger - this job always checks out and pushes to
  # `main` regardless of which event fired it, so running it on a PR didn't test the
  # PR's changes; it just started a second, redundant scrape-and-push-to-main run that
  # could race the real push-triggered run (see .github/workflows/pr_check.yml instead,
  # which actually runs against the PR's branch and never pushes anywhere).

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout main branch fully
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      # 2️⃣ Install system dependencies (Java for PDF scraping)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre graphviz

      # 3️⃣ Set up Python 3.12
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 4️⃣ Install Python dependencies (pyproject.toml/uv.lock is the single source of truth)
      - name: Install Python dependencies
        run: |
          pip install uv
          uv sync

      # 5️⃣ Run scraper
      - name: Run Python scraper
        run: uv run python ofsted_ilacs_scrape.py

      # 6️⃣ Sanity-check the scrape output before publishing it
      - name: Validate scrape output
        run: uv run python admin/validate_scrape_output.py

      # 7️⃣ Commit and push updated files back to main
      - name: Commit and push updated HTML and Excel
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add index.html ofsted_csc_ilacs_overview.xlsx
          git commit -m "Daily update via workflow" || echo "No changes to commit"
          git push origin main

      # 8️⃣ Stage just the two files GitHub Pages should serve - the `deploy` job below
      # runs on its own fresh runner with no checkout of its own, and publish_dir must
      # not be the raw repo checkout (that would publish source code and the ~144MB of
      # historic PDFs under export_data/ to the public site, not just the summary)
      - name: Prepare GitHub Pages content
        run: |
          mkdir -p _site
          cp index.html ofsted_csc_ilacs_overview.xlsx _site/

      # 9️⃣ Hand the staged files off to the deploy job (separate runner, no shared filesystem)
      - name: Upload GitHub Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: gh-pages-site
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 🔟 Fetch the two files staged by the build job above
      - name: Download GitHub Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: gh-pages-site
          path: _site

      # 1️⃣1️⃣ Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
